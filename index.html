<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChitChat Realtime</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>ChitChat</h1>
            <div id="status" class="badge">Menghubungkan...</div>
        </header>

        <div id="chat-container"></div>

        <form id="chat-form">
            <!-- Input file tersembunyi -->
            <input type="file" id="file-input" accept="image/*" style="display: none;">
            
            <div class="input-group">
                <button type="button" id="attach-btn">📎</button>
                <input type="text" id="msg-input" placeholder="Tulis pesan..." required autocomplete="off">
                <button type="submit" id="send-btn">Kirim</button>
            </div>
        </form>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
